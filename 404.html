<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | Yezun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        accent: '#8e9aaf',
                        darkBg: '#121212',
                        lightBg: '#fdfdfd',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:italic,wght@700&display=swap');

        body { transition: background-color 0.5s ease; }

        .fade-in {
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .social-link {
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-3px);
            opacity: 0.6;
        }

        .back-link {
            transition: all 0.3s ease;
            position: relative;
        }

        .back-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #8e9aaf;
            transition: width 0.3s ease;
        }

        .back-link:hover::after {
            width: 100%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #8e9aaf; border-radius: 10px; }
    </style>
</head>
<body class="bg-lightBg text-zinc-800 dark:bg-darkBg dark:text-zinc-200">

    <!-- Header / Navigation -->
    <header class="fixed w-full top-0 z-50 px-8 py-6 flex justify-between items-center mix-blend-difference">
        <div class="text-lg font-medium tracking-widest text-white">YEZUN</div>
        <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full border border-white/20 text-white hover:bg-white/10 transition-all">
            <i id="theme-toggle-icon" class="fas fa-moon"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="min-h-screen flex flex-col items-center justify-center px-6">

        <!-- 404 Content -->
        <section class="max-w-4xl w-full text-center space-y-8">
            <div class="fade-in">
                <span class="text-xs tracking-[0.4em] uppercase opacity-40 mb-2 block">Error 404</span>
                <h1 class="text-6xl md:text-9xl font-serif italic mb-6">Verloren?</h1>
                <div class="h-[1px] w-24 bg-accent mx-auto mb-8"></div>
                <p class="text-lg md:text-xl font-light tracking-wide max-w-2xl mx-auto leading-relaxed opacity-80 mb-12">
                    Diese Seite scheint im digitalen Nirgendwo verschwunden zu sein. Möchtest du wieder zurück zur Hauptseite?
                </p>

                <div class="pt-8">
                    <a href="https://yezun.de" class="back-link text-sm tracking-[0.3em] uppercase font-medium">
                        Zurück zur Hauptseite
                    </a>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer Area -->
    <footer class="fixed bottom-0 w-full p-8 flex justify-center pointer-events-none">
        <div class="text-[9px] tracking-[0.5em] uppercase opacity-30">
            YEZUN_HIKARI — I‘M LIKE AN ORANGE CAT
        </div>
    </footer>

    <script>
        // Theme Toggle
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleIcon = document.getElementById('theme-toggle-icon');
        const html = document.documentElement;

        // Default to dark mode
        if (localStorage.getItem('theme') !== 'light') {
            html.classList.add('dark');
            themeToggleIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeToggleIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeToggleIcon.classList.replace('fa-moon', 'fa-sun');
            }
        });

        // Simple Fade-In on Load
        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('visible');
                }, 200 * index);
            });
        });
    </script>
</body>
</html>
