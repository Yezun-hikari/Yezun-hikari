backend:
  name: github
  repo: Yezun-hikari/Yezun-hikari
  branch: web
  base_url: https://yezun-auth.vercel.app

media_folder: "assets/images/projects"
public_folder: "/assets/images/projects"

collections:
  - name: "data"
    label: "Daten"
    files:
      - name: "projects"
        label: "Projekte"
        file: "_data/projects.yml"
        description: "Hier kannst du deine Projekte auf der Projekt-Seite verwalten"
        fields:
          - label: "Projekte Liste"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Beschreibung", name: "description", widget: "text" }
              - { label: "Vorschaubild", name: "image", widget: "image", required: false }
              - { label: "Icon (FontAwesome Klasse)", name: "icon", widget: "string", default: "fas fa-code", hint: "Z.B. 'fab fa-github' oder 'fas fa-code'" }
              - { label: "Link URL", name: "link", widget: "string", required: false }
              - { label: "Link Text", name: "link_text", widget: "string", default: "Ansehen" }
              - { label: "Aktiv / Veröffentlicht", name: "active", widget: "boolean", default: true }
